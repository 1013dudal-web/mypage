<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 마인드셋 도우미</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            scroll-behavior: smooth; 
            overflow-x: hidden;
        }
        
        .transition-all-custom {
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 텍스트 페이드 효과 */
        .text-fade {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* 배경 그라데이션 애니메이션 */
        .bg-animate {
            background-size: 200% 200%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-rose-50 bg-animate text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [input, setInput] = useState('');
            const [output, setOutput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [history, setHistory] = useState([]);
            const [hasStarted, setHasStarted] = useState(false);
            const resultRef = useRef(null);

            const apiKey = ""; // Canvas 환경 제공
            const modelName = "gemini-2.5-flash-preview-09-2025";

            // 아이콘 초기화
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [output, isLoading, hasStarted, history]);

            const systemPrompt = `
                당신은 따뜻하고 공감 능력이 뛰어난 '수학 성장 마인드셋 코치'입니다.
                사용자가 수학에 대해 느끼는 부정적인 생각(고정 마인드셋)을 입력하면, 이를 긍정적이고 희망적인 '성장 마인드셋'으로 바꾸어 설명해 주세요.
                답변 원칙: 1. 공감 먼저, 2. 수학은 근육처럼 자란다는 점 강조, 3. 실천 가능한 격려, 4. 부드러운 존댓말.
            `;

            const transformMindset = async () => {
                if (!input.trim() || isLoading) return;
                
                setIsLoading(true);
                setHasStarted(true); // 영역 표시 유지
                
                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: input }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        }
                    );

                    if (!response.ok) throw new Error('API_FAILED');

                    const data = await response.json();
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (resultText) {
                        setOutput(resultText);
                        setHistory(prev => [{ negative: input, positive: resultText }, ...prev.slice(0, 4)]);
                        setInput('');
                        
                        // 결과가 나오면 부드럽게 스크롤
                        setTimeout(() => {
                            resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }, 100);
                    }
                } catch (error) {
                    if (apiKey === "") {
                        setOutput("현재 환경에서는 답변을 생성할 수 없어요. (Canvas 미리보기에서는 작동합니다!)");
                    } else {
                        setOutput("잠시 마음을 가다듬고 다시 시도해 볼까요?");
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-6 md:p-12">
                    <header className="max-w-2xl w-full text-center mb-16 opacity-0 animate-fade-in" style={{animation: 'fadeIn 1s forwards'}}>
                        <div className="inline-flex items-center justify-center p-4 bg-white rounded-3xl shadow-sm mb-6 border border-white">
                            <i data-lucide="brain-circuit" className="w-10 h-10 text-indigo-500 mr-3"></i>
                            <h1 className="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-rose-500">
                                수학 마인드셋 도우미
                            </h1>
                        </div>
                        <p className="text-slate-400 text-xl font-medium">여러분은 지금, 잘 해내고있어요.</p>
                    </header>

                    <main className="max-w-2xl w-full space-y-10">
                        {/* 입력 카드 */}
                        <section className="bg-white/70 backdrop-blur-xl p-8 rounded-[40px] shadow-2xl shadow-indigo-100/50 border border-white">
                            <div className="flex items-center mb-4 ml-1">
                                <i data-lucide="message-circle" className="w-5 h-5 text-indigo-400 mr-2"></i>
                                <label className="text-sm font-bold text-slate-400 uppercase tracking-widest">오늘의 걱정 나누기</label>
                            </div>
                            <div className="relative">
                                <textarea
                                    className="w-full h-40 p-6 bg-slate-50/50 border-2 border-transparent focus:border-indigo-100 rounded-[30px] outline-none transition-all resize-none text-xl leading-relaxed"
                                    placeholder="예: 저는 수학적 재능이 없는 것 같아요..."
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey) {
                                            e.preventDefault();
                                            transformMindset();
                                        }
                                    }}
                                />
                                <button
                                    onClick={transformMindset}
                                    disabled={isLoading || !input.trim()}
                                    className={`absolute bottom-4 right-4 p-4 rounded-2xl transition-all duration-300 ${
                                        isLoading || !input.trim() 
                                        ? 'bg-slate-200 text-slate-400' 
                                        : 'bg-indigo-500 text-white shadow-xl shadow-indigo-200 hover:scale-105 active:scale-95'
                                    }`}
                                >
                                    {isLoading ? <i data-lucide="refresh-cw" className="w-6 h-6 animate-spin"></i> : <i data-lucide="sparkles" className="w-6 h-6"></i>}
                                </button>
                            </div>
                        </section>

                        {/* 결과 카드: 항상 렌더링하되 스타일로 조절 */}
                        <section 
                            ref={resultRef}
                            className={`transition-all-custom transform ${
                                hasStarted ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 translate-y-10 scale-95 pointer-events-none'
                            }`}
                        >
                            <div className="bg-gradient-to-br from-indigo-500 via-purple-500 to-rose-500 p-[2px] rounded-[40px] shadow-2xl">
                                <div className="bg-white p-10 rounded-[38px] relative overflow-hidden min-h-[220px] flex flex-col justify-center">
                                    
                                    <div className="flex items-center mb-6">
                                        <div className="p-3 bg-rose-50 rounded-2xl mr-4">
                                            <i data-lucide="heart" className="w-6 h-6 text-rose-500 fill-rose-500"></i>
                                        </div>
                                        <h2 className="text-2xl font-bold text-slate-800 tracking-tight">따뜻한 마음의 한마디</h2>
                                    </div>

                                    <div className="relative">
                                        {isLoading && (
                                            <div className="absolute inset-0 flex flex-col items-center justify-center bg-white/60 backdrop-blur-sm z-20 animate-in fade-in duration-300">
                                                <div className="flex items-center space-x-3 text-indigo-600 font-bold bg-white px-6 py-3 rounded-full shadow-lg border border-indigo-50">
                                                    <div className="w-2 h-2 bg-indigo-500 rounded-full animate-bounce"></div>
                                                    <div className="w-2 h-2 bg-indigo-500 rounded-full animate-bounce [animation-delay:-.15s]"></div>
                                                    <div className="w-2 h-2 bg-indigo-500 rounded-full animate-bounce [animation-delay:-.3s]"></div>
                                                    <span className="ml-2">생각을 정리하고 있어요...</span>
                                                </div>
                                            </div>
                                        )}

                                        <div className={`text-slate-700 leading-relaxed text-xl italic whitespace-pre-wrap text-center text-fade ${isLoading ? 'opacity-20 scale-95 blur-[2px]' : 'opacity-100 scale-100'}`}>
                                            {output ? `"${output}"` : "여러분의 진심을 기다리고 있어요."}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* 역사 기록 */}
                        <div className={`space-y-6 pt-4 transition-all duration-1000 ${history.length > 0 ? 'opacity-100' : 'opacity-0'}`}>
                            <div className="flex items-center ml-2">
                                <div className="h-px bg-slate-200 flex-grow mr-4"></div>
                                <h3 className="text-xs font-black text-slate-300 uppercase tracking-[0.3em]">나의 변화 기록</h3>
                                <div className="h-px bg-slate-200 flex-grow ml-4"></div>
                            </div>
                            {history.map((item, index) => (
                                <div key={index} className="bg-white/40 backdrop-blur-sm p-6 rounded-3xl border border-white/50 hover:bg-white/60 transition-all group shadow-sm">
                                    <div className="flex items-start opacity-40 mb-3 group-hover:opacity-60 transition-opacity">
                                        <i data-lucide="quote" className="w-4 h-4 mr-3 rotate-180"></i>
                                        <p className="text-sm italic">{item.negative}</p>
                                    </div>
                                    <div className="flex items-start text-indigo-600 font-semibold leading-relaxed">
                                        <i data-lucide="sparkles" className="w-5 h-5 mr-3 mt-1 text-amber-400"></i>
                                        <p>{item.positive}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    <footer className="mt-24 py-10 opacity-30 text-xs tracking-widest text-center">
                        <p>© 2024 수학 마인드셋 도우미 | 당신은 이미 충분히 빛나고 있습니다.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Global styles
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(-10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
