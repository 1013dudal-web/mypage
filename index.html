<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수학 마인드셋 도우미</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; scroll-behavior: smooth; }
        
        /* 부드러운 나타나기 애니메이션 */
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 텍스트 교체 시 부드러운 효과 */
        .text-transition {
            transition: all 0.5s ease-in-out;
        }

        /* 로딩 중 블러 효과 */
        .blur-sm { filter: blur(4px); }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-rose-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [input, setInput] = useState('');
            const [output, setOutput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [history, setHistory] = useState([]);
            const [hasStarted, setHasStarted] = useState(false);
            const resultRef = useRef(null);

            const apiKey = ""; // Canvas 환경에서는 자동으로 채워집나다.
            const modelName = "gemini-2.5-flash-preview-09-2025";

            const initIcons = () => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            };

            // 결과값이 업데이트되거나 로딩 상태가 바뀔 때 아이콘 다시 그리기
            useEffect(() => {
                initIcons();
            }, [output, isLoading, history, hasStarted]);

            const systemPrompt = `
                당신은 따뜻하고 공감 능력이 뛰어난 '수학 성장 마인드셋 코치'입니다.
                사용자가 수학에 대해 느끼는 부정적인 생각(고정 마인드셋)을 입력하면, 이를 긍정적이고 희망적인 '성장 마인드셋'으로 바꾸어 설명해 주세요.
                답변 원칙: 1. 공감 먼저, 2. 수학은 근육처럼 자란다는 점 강조, 3. 구체적인 격려, 4. 부드러운 존댓말.
            `;

            const transformMindset = async () => {
                if (!input.trim() || isLoading) return;
                
                setIsLoading(true);
                setHasStarted(true); // 결과창 영역을 고정시킴
                
                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: input }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] }
                            })
                        }
                    );

                    if (!response.ok) throw new Error('API_CALL_FAILED');

                    const data = await response.json();
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (resultText) {
                        setOutput(resultText);
                        setHistory(prev => [{ negative: input, positive: resultText }, ...prev.slice(0, 4)]);
                        setInput('');
                        
                        // 결과가 나오면 화면을 아래로 부드럽게 스크롤
                        setTimeout(() => {
                            resultRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 100);
                    }
                } catch (error) {
                    if (apiKey === "") {
                        setOutput("현재 API 키가 설정되지 않아 답변을 생성할 수 없어요. (Canvas의 '미리보기'에서는 정상 작동합니다!)");
                    } else {
                        setOutput("잠시 연결이 원활하지 않아요. 다시 시도해 볼까요?");
                    }
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4 md:p-8">
                    <header className="max-w-2xl w-full text-center mb-12 fade-in-up">
                        <div className="inline-flex items-center justify-center p-3 bg-white rounded-2xl shadow-sm mb-4">
                            <i data-lucide="brain-circuit" className="w-8 h-8 text-indigo-500 mr-2"></i>
                            <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-rose-500">
                                수학 마인드셋 도우미
                            </h1>
                        </div>
                        <p className="text-slate-500 text-lg">여러분은 지금, 잘 해내고있어요.</p>
                    </header>

                    <main className="max-w-2xl w-full space-y-8">
                        {/* 입력 영역 */}
                        <section className="bg-white/80 backdrop-blur-md p-6 rounded-3xl shadow-xl border border-white fade-in-up">
                            <label className="block text-sm font-semibold text-slate-400 mb-3 ml-1">지금 마음속의 수학에 대한 부담감을 적어주세요</label>
                            <div className="relative">
                                <textarea
                                    className="w-full h-32 p-4 bg-slate-50/50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-300 outline-none transition-all resize-none text-lg"
                                    placeholder="예: 아무리 풀어도 모르겠어요..."
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter' && !e.shiftKey) {
                                            e.preventDefault();
                                            transformMindset();
                                        }
                                    }}
                                />
                                <button
                                    onClick={transformMindset}
                                    disabled={isLoading || !input.trim()}
                                    className="absolute bottom-3 right-3 p-3 rounded-xl bg-indigo-500 text-white disabled:bg-slate-200 transition-all hover:scale-110 active:scale-95 shadow-lg shadow-indigo-200"
                                >
                                    {isLoading ? <i data-lucide="refresh-cw" className="w-5 h-5 animate-spin"></i> : <i data-lucide="send" className="w-5 h-5"></i>}
                                </button>
                            </div>
                        </section>

                        {/* 결과 영역: 한 번이라도 시작했다면 고정 표시 */}
                        {hasStarted && (
                            <section ref={resultRef} className="fade-in-up">
                                <div className="bg-gradient-to-r from-indigo-500 to-purple-500 p-px rounded-3xl shadow-2xl overflow-hidden">
                                    <div className="bg-white p-8 rounded-[23px] relative min-h-[160px] flex flex-col justify-center">
                                        
                                        <div className="flex items-center mb-4">
                                            <i data-lucide="heart" className="w-5 h-5 text-rose-500 mr-2 fill-rose-500"></i>
                                            <h2 className="text-xl font-bold text-slate-800">성장 마인드셋의 목소리</h2>
                                        </div>

                                        <div className="relative">
                                            {isLoading && (
                                                <div className="absolute inset-0 flex flex-col items-center justify-center bg-white/40 backdrop-blur-[1px] z-10 transition-opacity duration-300">
                                                    <div className="flex items-center space-x-2 text-indigo-500 font-bold bg-white/80 px-4 py-2 rounded-full shadow-sm">
                                                        <i data-lucide="sparkles" className="w-5 h-5 animate-bounce"></i>
                                                        <span>따뜻한 답변을 생각하고 있어요...</span>
                                                    </div>
                                                </div>
                                            )}

                                            <div className={`text-slate-700 leading-relaxed text-lg italic whitespace-pre-wrap text-center text-transition ${isLoading ? 'opacity-30 blur-sm scale-95' : 'opacity-100 scale-100'}`}>
                                                {output ? `"${output}"` : "답변을 준비하고 있어요..."}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}

                        {/* 과거 기록 */}
                        {history.length > 0 && (
                            <div className="space-y-4 pt-4 fade-in-up">
                                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">나의 마음 기록</h3>
                                {history.map((item, index) => (
                                    <div key={index} className="bg-white/40 p-4 rounded-2xl border border-white/50 text-sm hover:bg-white/60 transition-colors">
                                        <div className="flex items-start opacity-50 mb-1">
                                            <i data-lucide="message-circle" className="w-4 h-4 mr-2"></i>
                                            <p className="line-clamp-1">{item.negative}</p>
                                        </div>
                                        <div className="flex items-start text-indigo-600 font-medium">
                                            <i data-lucide="sparkles" className="w-4 h-4 mr-2"></i>
                                            <p className="line-clamp-2">{item.positive}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <footer className="mt-auto py-10 opacity-40 text-xs text-center">
                        <p>© 수학 마인드셋 도우미 | 당신의 가능성은 무한합니다.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
